name: crossref Layer 2 (conformance + interop)
on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"   # nightly

jobs:
  layer2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
      - name: Build images + run Layer 2 (conformance + interop)
        run: |
          # Build and start the core conformance topology (controlled-server, oracle, cxf).
          docker compose -f crossref/docker-compose.yml -f crossref/docker-compose.local.yml up -d --build
          # Also build the interop client images (cxf-client, zeep-client; profile interop).
          docker compose -f crossref/docker-compose.yml -f crossref/docker-compose.local.yml \
            --profile interop build
          # Run the full Layer-2 orchestrator: conformance + interop clients.
          # --interop drives cxf-client and zeep-client via `docker compose ... run --rm`.
          cargo run -p crossref --bin layer2 -- --promote --interop
      - name: Tear down
        if: always()
        run: docker compose -f crossref/docker-compose.yml -f crossref/docker-compose.local.yml down -v
      - name: Surface snapshot drift / promotion as reviewable change
        run: |
          git status --short crossref/snapshots
          # Layer 2 promotion changes are committed deliberately, not by CI; this step
          # only surfaces them. A non-empty diff here on a scheduled run is expected
          # (newly verified) and reviewed via a follow-up PR, never auto-committed.
